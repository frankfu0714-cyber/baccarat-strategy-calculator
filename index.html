<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>賭局策略機率計算機 | Baccarat Strategy Calculator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root{
    --navy:#0f2540; --navy2:#16345c; --green:#1f9d6b; --green-d:#137a52;
    --red:#d64545; --amber:#d99000; --bg:#f4f6f9; --card:#ffffff;
    --line:#e3e8ef; --txt:#1d2733; --muted:#6b7785; --chip:#eef3f8;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55;}
  header{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;padding:28px 24px 22px;position:relative;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 18px;}
  header .wrap{padding:0;max-width:1080px;position:relative;}
  h1{margin:0 0 4px;font-size:24px;letter-spacing:.5px;}
  .sub{color:#bcd0e6;font-size:14px;margin:0;}
  .tagline{margin-top:10px;font-size:12.5px;color:#9fb8d4;font-style:italic;max-width:760px;}
  .langtoggle{position:absolute;top:0;right:0;background:rgba(255,255,255,.12);color:#fff;
    border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:6px 16px;font-size:13px;
    cursor:pointer;transition:.15s;}
  .langtoggle:hover{background:rgba(255,255,255,.22);}
  main{max-width:1080px;margin:22px auto 60px;padding:0 18px;}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:22px;}
  @media(max-width:860px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;
    box-shadow:0 1px 3px rgba(15,37,64,.05);}
  .card h2{font-size:15px;margin:0 0 16px;color:var(--navy);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .card h2 small{font-weight:400;color:var(--muted);font-size:12px;}
  label{display:block;font-size:13px;margin:14px 0 5px;color:var(--txt);font-weight:600;}
  label .lbl-hint{font-weight:400;color:var(--muted);}
  label .unit{font-weight:400;color:var(--muted);}
  input[type=number],select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:15px;background:#fbfcfe;color:var(--txt);}
  input:focus,select:focus{outline:none;border-color:var(--green);background:#fff;}
  .row{display:flex;gap:10px;}
  .row>div{flex:1;}
  .toggle{display:flex;align-items:center;gap:9px;margin-top:14px;font-size:13px;color:var(--txt);cursor:pointer;}
  .toggle input{width:auto;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:4px;}
  button.calc{width:100%;margin-top:20px;background:var(--green);color:#fff;border:none;padding:13px;
    border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
  button.calc:hover{background:var(--green-d);}
  .results{display:flex;flex-direction:column;gap:22px;}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(max-width:520px){.kpis{grid-template-columns:1fr;}}
  .kpi{border:1px solid var(--line);border-radius:12px;padding:15px 16px;background:#fbfcfe;}
  .kpi .k-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .kpi .k-val{font-size:27px;font-weight:800;line-height:1.1;}
  .kpi .k-note{font-size:11.5px;color:var(--muted);margin-top:5px;}
  .k-green{color:var(--green-d);} .k-red{color:var(--red);} .k-amber{color:var(--amber);} .k-navy{color:var(--navy);}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
  th,td{padding:8px 10px;text-align:right;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;}
  thead th{color:var(--muted);font-weight:600;font-size:12px;background:#fafbfd;}
  tr.bust td{background:#fdecec;color:var(--red);font-weight:700;}
  .warn{border-left:4px solid var(--amber);background:#fff8e8;border-radius:8px;padding:14px 16px;font-size:13.5px;}
  .warn.red{border-left-color:var(--red);background:#fdecec;}
  .warn b{color:var(--navy);}
  .chartbox{position:relative;height:240px;}
  .pill{display:inline-block;background:var(--chip);color:var(--navy);border-radius:20px;padding:3px 10px;
    font-size:11.5px;margin:2px 4px 2px 0;}
  .ev-line{font-size:13.5px;margin-top:10px;padding:11px 14px;border-radius:8px;background:#eef3f8;}
  footer{max-width:1080px;margin:0 auto;padding:0 18px 50px;color:var(--muted);font-size:12px;text-align:center;}
  .disclaimer{background:#0f2540;color:#cfe0f2;padding:18px;border-radius:12px;font-size:12.5px;margin-top:24px;line-height:1.7;}
  .disclaimer b{color:#fff;}
</style>

    <div class="card">
      <h2 data-k="resTitle"></h2>
      <div class="kpis">
        <div class="kpi">

          <div class="k-label" data-k="kSim"></div>
          <div class="k-val k-green" id="rSim">–</div>
          <div class="k-note" id="rSimNote"></div>
        </div>
        <div class="kpi">
          <div class="k-label" data-k="kBust"></div>
          <div class="k-val k-red" id="rBust">–</div>
          <div class="k-note" data-k="kBustNote"></div>
        </div>
        <div class="kpi">
          <div class="k-label" data-k="kStreak"></div>
          <div class="k-val k-amber" id="rStreak">–</div>
          <div class="k-note" id="rStreakNote"></div>
        </div>
      </div>
      <div class="ev-line" id="evLine"></div>
      <div class="hint" id="scaleNote" style="display:none;margin-top:8px"></div>
    </div>

    <div class="card">
      <h2><span data-k="ladderTitle"></span> <small data-k="ladderSub"></small></h2>
      <table id="ladder">
        <thead><tr>
          <th data-k="thHand"></th><th data-k="thBet"></th><th data-k="thCum"></th>
          <th data-k="thNext"></th><th data-k="thRem"></th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="card">
      <h2><span data-k="chartTitle"></span> <small data-k="chartSub"></small></h2>
      <div class="chartbox"><canvas id="chart"></canvas></div>
    </div>

    <div class="warn red" id="realityBox"></div>

  </section>
</div>

  <span data-k="disc2"></span>
</div>

<footer data-k="footer"></footer>

    disc1:'Martingale does not change expected value. In a fair game EV = 0; with any commission (Banker 1.06% / Player 1.24% house edge) long-run EV is always negative. You use a high probability to win a little while risking a small probability of losing everything — exactly why casinos do not fear the double-up system and even impose table limits.',

function fmt(n){ return Math.round(n).toLocaleString('en-US'); }
function pct(x){ return (x*100).toFixed(2) + '%'; }

function getModel(){
  const m = $('model').value;
  if(m==='ideal')   return {win:0.5,    pay:1,    half:0,      noteKey:'noteIdeal'};
  if(m==='player')  return {win:0.4932, pay:1,    half:0,      noteKey:'notePlayer'};
  if(m==='banker')  return {win:0.5068, pay:0.95, half:0,      noteKey:'noteBanker'};
  if(m==='bankerNC')return {win:0.5068, pay:1,    half:0.1175, noteKey:'noteBankerNC'};
  return {win:(+$('cWin').value)/100, pay:+$('cPay').value, half:0, noteKey:'noteCustom'};
}

// largest m such that base*(2^(m+1)-1) <= bankroll  => survivable consecutive bets
function maxStreak(bankroll, base){
  let m=0;
  while(base*(Math.pow(2,m+1)-1) <= bankroll) m++;
  return m;
}

// Monte Carlo
function simulate(bankroll, base, target, win, pay, winDouble, trials, half){
  half = half || 0;
  let success=0, sumEnd=0;
  for(let t=0;t<trials;t++){
    let bal=bankroll, bet=base, guard=0;
    while(true){
      if(++guard>200000){ break; }
      if(bal-bankroll >= target){ success++; break; }
      if(bet>bal+1e-9){ break; }
      bal -= bet;
      if(Math.random()<win){
        const p = (half && Math.random()<half) ? pay*0.5 : pay;
        bal += bet*(1+p);
        bet = winDouble ? bet*2 : base;
      }else{
        bet = bet*2;
      }
    }
    sumEnd += (bal-bankroll);
  }
  return {succ:success/trials, ev:sumEnd/trials};
}

function buildLadder(bankroll, base){
  const tb=$('ladder').querySelector('tbody'); tb.innerHTML='';
  const d=L[lang];
  let cum=0, remaining=bankroll;
  const surv=maxStreak(bankroll,base);
  for(let i=1;i<=Math.min(surv+2,14);i++){
    const bet=base*Math.pow(2,i-1);
    const canPlace = bet<=remaining;
    cum += canPlace?bet:0;
    const after = canPlace? remaining-bet : remaining;
    const tr=document.createElement('tr');
    const next=base*Math.pow(2,i);
    const handLbl = lang==='zh' ? ('第'+i+'把') : ('#'+i);
    if(!canPlace){
      tr.className='bust';
      const txt = lang==='zh'
        ? ('需下注 '+fmt(bet)+'，但只剩 '+fmt(remaining)+' → 斷纜爆輸 💥')
        : ('needs NT$ '+fmt(bet)+' but only NT$ '+fmt(remaining)+' left → ruin 💥');
      tr.innerHTML='<td>'+handLbl+'</td><td colspan="4">'+txt+'</td>';
      tb.appendChild(tr); break;
    }
    tr.innerHTML='<td>'+handLbl+'</td><td>'+fmt(bet)+'</td><td>'+fmt(cum)+'</td><td>'+fmt(next)+'</td><td>'+fmt(after)+'</td>';
    tb.appendChild(tr);
    remaining=after;
  }
}

function drawChart(bankroll, base, win, pay, winDouble, half){
  const d=L[lang];
  const labels=[], fairData=[], simData=[];
  const maxT = Math.max(bankroll, base*20);
  for(let i=1;i<=8;i++){
    const T = Math.round((maxT*i/8)/base)*base || base*i;
    labels.push(fmt(T));
    fairData.push(+(bankroll/(bankroll+T)*100).toFixed(1));
    simData.push(+(simulate(bankroll,base,T,win,pay,winDouble,6000,half).succ*100).toFixed(1));
  }
  if(chart) chart.destroy();
  chart=new Chart($('chart'),{
    type:'line',
    data:{labels,datasets:[
      {label:d.dsFair,data:fairData,borderColor:'#16345c',backgroundColor:'rgba(22,52,92,.08)',tension:.3,fill:true,borderDash:[6,4]},
      {label:d.dsSim,data:simData,borderColor:'#1f9d6b',backgroundColor:'rgba(31,157,107,.08)',tension:.3,fill:true}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      scales:{y:{min:0,max:100,title:{display:true,text:d.chartY}},
              x:{title:{display:true,text:d.chartX}}},
      plugins:{legend:{labels:{boxWidth:14,font:{size:11}}}}}
  });
}

function updateUnits(){
  const d=L[lang], on=$('pctMode').checked;
  $('baseUnit').textContent   = on ? d.unitPct : d.unitNT;
  $('targetUnit').textContent = on ? d.unitPct : d.unitNT;
}

function run(){
  const d=L[lang];
  const pctMode=$('pctMode').checked;
  const bankroll=+$('bankroll').value;
  let base, target;
  if(pctMode){
    base   = bankroll*(+$('baseBet').value)/100;
    target = bankroll*(+$('target').value)/100;
  } else {
    base   = +$('baseBet').value;
    target = +$('target').value;
  }
  if(!(bankroll>0&&base>0&&target>0)||base>bankroll){ alert(d.alertInvalid); return; }

  if(pctMode){
    $('baseResolved').style.display='block';   $('baseResolved').textContent='= NT$ '+fmt(base);
    $('targetResolved').style.display='block'; $('targetResolved').textContent='= NT$ '+fmt(target);
    $('scaleNote').style.display='block';
    const bp=+$('baseBet').value, tp=+$('target').value;
    $('scaleNote').textContent = lang==='zh'
      ? ('💡 基本注 '+bp+'%、目標 '+tp+'% of bankroll。達標率與爆輸率只取決於這些比例 — 本金是 5 萬還是 500 萬，結果都相同。')
      : ('💡 Base bet '+bp+'%, target '+tp+'% of bankroll. Success and ruin depend only on these ratios — a NT$50k or NT$5M bankroll gives the same result.');
  } else {
    $('baseResolved').style.display='none';
    $('targetResolved').style.display='none';
    $('scaleNote').style.display='none';
  }

  const {win,pay,half,noteKey}=getModel();
  const winDouble=$('winDouble').checked;

  const fair = bankroll/(bankroll+target);
  const sim = simulate(bankroll,base,target,win,pay,winDouble,50000,half);
  const surv = maxStreak(bankroll,base);

  $('rFair').textContent = pct(fair);
  $('rSim').textContent  = pct(sim.succ);
  $('rSimNote').textContent = d[noteKey];
  $('rBust').textContent = pct(1-sim.succ);

  const placeable = surv;
  const bustBet = base*Math.pow(2,placeable);
  $('rStreak').textContent = lang==='zh' ? (placeable+' 連輸') : (placeable+' in a row');
  $('rStreakNote').textContent = lang==='zh'
    ? ('連輸 '+placeable+' 把後，第 '+(placeable+1)+' 把需下注 '+fmt(bustBet)+'，本金不夠 → 爆輸')
    : ('after '+placeable+' losses, hand #'+(placeable+1)+' needs NT$ '+fmt(bustBet)+' — not enough → ruin');

  const streakProb = Math.pow(1-win, placeable);
  const evColor = sim.ev<-1 ? 'k-red' : (sim.ev>1?'k-green':'k-navy');
  const evLabel = lang==='zh' ? '每一回合（玩到收手或爆輸）期望損益：' : 'Expected result per round (until you stop or bust): ';
  const pillWin = lang==='zh' ? ('單局勝率 '+pct(win)) : ('win rate '+pct(win));
  const pillPay = lang==='zh' ? ('賠率 '+pay+':1') : ('payout '+pay+':1');
  const pillStreak = lang==='zh'
    ? ('致命長龍：連輸 '+placeable+' 把機率 '+pct(streakProb))
    : ('killer streak: '+placeable+' losses → '+pct(streakProb));
  $('evLine').innerHTML =
    '<b>'+evLabel+'</b> <span class="'+evColor+'" style="font-weight:800">'+
    (sim.ev>=0?'+':'')+fmt(sim.ev)+(lang==='zh'?' 元':' NT$')+'</span>　'+
    '<span class="pill">'+pillWin+'</span>'+
    '<span class="pill">'+pillPay+'</span>'+
    '<span class="pill">'+pillStreak+'</span>';

  buildLadder(bankroll,base);
  drawChart(bankroll,base,win,pay,winDouble,half);

  const ruin=1-sim.succ;
  $('realityBox').innerHTML = lang==='zh'
    ? ('⚠️ <b>現實提醒：</b>你打算用 <b>'+pct(sim.succ)+'</b> 的機率去贏 <b>'+fmt(target)+'</b> 元，'+
       '但同時押上 <b>'+pct(ruin)+'</b> 的機率輸掉全部 <b>'+fmt(bankroll)+'</b> 元本金。'+
       '只要連輸 <b>'+placeable+'</b> 把（每靴牌幾乎必然出現的長龍），資金鏈就斷。'+
       (sim.ev<-1?' 在此抽水模型下，玩越多次、期望損失越大。':''))
    : ('⚠️ <b>Reality check:</b> you are using a <b>'+pct(sim.succ)+'</b> chance to win <b>NT$ '+fmt(target)+'</b>, '+
       'while risking a <b>'+pct(ruin)+'</b> chance of losing your entire <b>NT$ '+fmt(bankroll)+'</b> bankroll. '+
       'Just <b>'+placeable+'</b> losses in a row (a streak almost certain to appear each shoe) breaks your bankroll.'+
       (sim.ev<-1?' With commission, the more you play the more you expect to lose.':''));
}

function applyLang(){
  const d=L[lang];
  document.documentElement.lang = lang==='zh'?'zh-Hant':'en';
  document.querySelectorAll('[data-k]').forEach(el=>{ el.textContent = d[el.dataset.k]; });
  $('langBtn').textContent = lang==='zh' ? 'English' : '中文';
  updateUnits();
  run();
}

$('langBtn').addEventListener('click',()=>{ lang = (lang==='zh'?'en':'zh'); applyLang(); });
$('model').addEventListener('change',()=>{ $('customBox').style.display = $('model').value==='custom'?'block':'none'; });
$('pctMode').addEventListener('change',()=>{
  const on=$('pctMode').checked, bankroll=+$('bankroll').value||0;
  if(on){
    if(bankroll>0){
      $('baseBet').value = +((+$('baseBet').value)/bankroll*100).toFixed(2);
      $('target').value  = +((+$('target').value)/bankroll*100).toFixed(2);
    } else { $('baseBet').value=2; $('target').value=10; }
    $('baseBet').step=0.5; $('target').step=1;
  } else {
    if(bankroll>0){
      $('baseBet').value = Math.round(bankroll*(+$('baseBet').value)/100);
      $('target').value  = Math.round(bankroll*(+$('target').value)/100);
    }
    $('baseBet').step=100; $('target').step=1000;
  }
  updateUnits();
  run();
});
$('run').addEventListener('click',run);
applyLang();
</script>
</body>
</html>
